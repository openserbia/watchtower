name: Release (Production)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '**/v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Lint
        run: devbox run -- task lint

  test:
    name: Test
    runs-on: [self-hosted, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run tests
        run: devbox run -- task test

  build:
    name: Build
    runs-on: [self-hosted, x64]
    needs:
      - test
      - lint
    permissions:
      contents: write
      packages: write
      id-token: write   # keyless cosign OIDC
    env:
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        # `devbox run` re-resolves the "latest"-pinned tools and rewrites
        # devbox.lock, which would make GoReleaser abort on a dirty git state.
        # Restore the lock inside the devbox shell before invoking GoReleaser.
        run: devbox run -- bash -c 'git checkout -- devbox.lock && goreleaser release --clean'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Trivy CVE scan (observation mode — exit-code: 0 = never fail.
      # Flip to 1 after the baseline is clean to make this a hard gate).
      # Scans the just-published :latest tag (same digest as :${{ github.ref_name }}
      # since goreleaser publishes both in lockstep).
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/openserbia/watchtower:latest
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
