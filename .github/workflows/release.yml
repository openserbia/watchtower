name: Release (Production)

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '**/v[0-9]+.[0-9]+.[0-9]+'

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Lint
        run: devbox run -- task lint

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run tests
        run: devbox run -- task test

  build:
    name: Build
    runs-on: self-hosted
    needs:
      - test
      - lint
    permissions:
      contents: write
      packages: write
    env:
      CGO_ENABLED: 0
      TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: devbox run -- goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest for version
        run: |
          export DH_TAG=$(git tag --points-at HEAD | sed 's/^v*//')
          docker manifest create \
            openserbia/watchtower:$DH_TAG \
            openserbia/watchtower:amd64-$DH_TAG \
            openserbia/watchtower:i386-$DH_TAG \
            openserbia/watchtower:armhf-$DH_TAG \
            openserbia/watchtower:arm64v8-$DH_TAG
          docker manifest create \
            ghcr.io/openserbia/watchtower:$DH_TAG \
            ghcr.io/openserbia/watchtower:amd64-$DH_TAG \
            ghcr.io/openserbia/watchtower:i386-$DH_TAG \
            ghcr.io/openserbia/watchtower:armhf-$DH_TAG \
            ghcr.io/openserbia/watchtower:arm64v8-$DH_TAG
      - name: Annotate manifest for version
        run: |
          for REPO in '' ghcr.io/ ; do

          docker manifest annotate \
            ${REPO}openserbia/watchtower:$(echo $TAG | sed 's/^v*//') \
            ${REPO}openserbia/watchtower:i386-$(echo $TAG | sed 's/^v*//') \
            --os linux \
            --arch 386

          docker manifest annotate \
            ${REPO}openserbia/watchtower:$(echo $TAG | sed 's/^v*//') \
            ${REPO}openserbia/watchtower:armhf-$(echo $TAG | sed 's/^v*//') \
            --os linux \
            --arch arm

          docker manifest annotate \
            ${REPO}openserbia/watchtower:$(echo $TAG | sed 's/^v*//') \
            ${REPO}openserbia/watchtower:arm64v8-$(echo $TAG | sed 's/^v*//') \
            --os linux \
            --arch arm64 \
            --variant v8

            done
      - name: Create manifest for latest
        run: |
          docker manifest create \
            openserbia/watchtower:latest \
            openserbia/watchtower:amd64-latest \
            openserbia/watchtower:i386-latest \
            openserbia/watchtower:armhf-latest \
            openserbia/watchtower:arm64v8-latest
          docker manifest create \
            ghcr.io/openserbia/watchtower:latest \
            ghcr.io/openserbia/watchtower:amd64-latest \
            ghcr.io/openserbia/watchtower:i386-latest \
            ghcr.io/openserbia/watchtower:armhf-latest \
            ghcr.io/openserbia/watchtower:arm64v8-latest
      - name: Annotate manifest for latest
        run: |
          for REPO in '' ghcr.io/ ; do

          docker manifest annotate \
            ${REPO}openserbia/watchtower:latest \
            ${REPO}openserbia/watchtower:i386-latest \
            --os linux \
            --arch 386

          docker manifest annotate \
            ${REPO}openserbia/watchtower:latest \
            ${REPO}openserbia/watchtower:armhf-latest \
            --os linux \
            --arch arm

          docker manifest annotate \
            ${REPO}openserbia/watchtower:latest \
            ${REPO}openserbia/watchtower:arm64v8-latest \
            --os linux \
            --arch arm64 \
            --variant v8

          done
      - name: Push manifests to Dockerhub
        env:
          DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          docker login -u $DOCKER_USER -p $DOCKER_TOKEN && \
            docker manifest push openserbia/watchtower:$(echo $TAG | sed 's/^v*//') && \
            docker manifest push openserbia/watchtower:latest
      - name: Push manifests to GitHub Container Registry
        env:
          DOCKER_USER: ${{ github.actor }}
          DOCKER_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker login -u $DOCKER_USER -p $DOCKER_TOKEN ghcr.io && \
            docker manifest push ghcr.io/openserbia/watchtower:$(echo $TAG | sed 's/^v*//') && \
            docker manifest push ghcr.io/openserbia/watchtower:latest
