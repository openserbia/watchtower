name: Push to main

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build
        run: devbox run -- task build
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Test
        run: devbox run -- task test
      - name: Publish coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
  publish:
    needs:
      - build
      - test
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.self-contained
          push: true
          # Multi-arch manifest list so the fleet's arm64 hosts (e.g. the rpi)
          # can run :latest-dev. The builder cross-compiles (BUILDPLATFORM-pinned
          # builder + GOOS/GOARCH in the Dockerfile), so no QEMU is required.
          platforms: linux/amd64,linux/arm64
          tags: |
            openserbia/watchtower:latest-dev
            ghcr.io/openserbia/watchtower:latest-dev
      # Trivy CVE scan (observation mode — exit-code: 0 = never fail.
      # Flip to 1 after the baseline is clean to make this a hard gate).
      # SARIF upload omitted (private repo without GHAS); operator
      # reads findings from the Trivy table output below.
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/openserbia/watchtower:latest-dev
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: openserbia/watchtower
          short-description: Automate Docker container base image updates (openserbia fork of containrrr/watchtower)
          readme-filepath: ./README.md
