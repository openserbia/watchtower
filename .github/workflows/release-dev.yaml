name: Push to main

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build
        run: devbox run -- task build
  test:
    runs-on: [self-hosted, x64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Test
        run: devbox run -- task test
      - name: Publish coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
  publish:
    needs:
      - build
      - test
    runs-on: [self-hosted, x64]
    permissions:
      contents: read
      packages: write
      id-token: write   # keyless cosign OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history + tags so `git describe` works
      - name: Compute version
        id: ver
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: dockerfiles/Dockerfile.self-contained
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          provenance: true   # SLSA build provenance (parity with tagged releases)
          sbom: true         # CycloneDX SBOM attestation
          # Multi-arch manifest list matching the goreleaser release set
          # (dockers_v2 in goreleaser.yml) so :latest-dev runs anywhere a tagged
          # release does. The builder cross-compiles (BUILDPLATFORM-pinned builder
          # + GOOS/GOARCH/GOARM in the Dockerfile), so no QEMU is required.
          platforms: linux/amd64,linux/arm/v7,linux/arm64,linux/riscv64
          tags: |
            openserbia/watchtower:latest-dev
            ghcr.io/openserbia/watchtower:latest-dev
      - name: Sign dev images (keyless cosign)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          devbox run -- cosign sign --yes "openserbia/watchtower@${DIGEST}"
          devbox run -- cosign sign --yes "ghcr.io/openserbia/watchtower@${DIGEST}"
      # Trivy CVE scan (observation mode — exit-code: 0 = never fail.
      # Flip to 1 after the baseline is clean to make this a hard gate).
      # SARIF upload omitted (private repo without GHAS); operator
      # reads findings from the Trivy table output below.
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/openserbia/watchtower:latest-dev
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
      - name: Sync Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa  # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: openserbia/watchtower
          short-description: Automate Docker container base image updates (openserbia fork of containrrr/watchtower)
          readme-filepath: ./README.md
