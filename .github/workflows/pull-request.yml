name: Pull Request

# SECURITY: this workflow triggers on `pull_request`, so a PR from ANY fork can
# run the (PR-controlled) Taskfile / test code here. It MUST run on
# GitHub-hosted, ephemeral `ubuntu-latest` runners — NEVER on the self-hosted
# org pool (label `self-hosted`/`x64`), which has a rootful Docker socket and is
# root-equivalent on the production build/publish host. Standard runners are
# free with unlimited minutes on public repos. Image build + publish (which
# needs registry credentials) lives in release.yml / release-dev.yaml and runs
# self-hosted only on trusted push/tag events.

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          devbox-version: 0.16.0
          enable-cache: 'true'
      - name: Lint
        run: devbox run -- task lint
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          devbox-version: 0.16.0
          enable-cache: 'true'
      - name: Run tests
        run: devbox run -- task test
      - name: Publish coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7  # v0.15.0
        with:
          devbox-version: 0.16.0
          enable-cache: 'true'
      - name: Build binary
        run: devbox run -- task build
