# Prometheus alerting rules for Watchtower.
#
# Wire into a Prometheus rule_files entry:
#   rule_files:
#     - /etc/prometheus/watchtower-alerts.yml
#
# Assumes Watchtower is scraped as job "watchtower" with one or more
# instances; annotations use `{{ $labels.instance }}` throughout so alert
# messages disambiguate when you have multiple daemons. Rule selection has
# been tuned in production — we deliberately don't include an "all scans
# skipped" rule or a generic "scans but no updates" rule because in homelab
# cadence those are either expected (digest-pinned stacks) or covered by
# more actionable signals below.
groups:
  - name: watchtower
    interval: 30s
    rules:
      - alert: WatchtowerRollbackTriggered
        # A replacement container failed its health check and Watchtower
        # restored the previous image. One rollback is meaningful — usually
        # a broken release or config drift between image and environment.
        expr: increase(watchtower_rollbacks_total{job="watchtower"}[1h]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Watchtower on {{ $labels.instance }} rolled back an update"
          description: "A replacement container failed its healthcheck and Watchtower restored the previous image. Check the watchtower container logs for the container name and last-reported health status before the next release attempt."

      - alert: WatchtowerScansStopped
        # Fires when the latest scan timestamp is older than 2× the configured
        # poll interval. Scales to any cadence — 60 s polls alert at 120 s, a
        # daily poll alerts at 48 h. Replaces the hardcoded 2 h window which
        # false-alarmed for long-cadence deployments. The `unless absent(...)`
        # guard skips instances whose binary doesn't yet export the interval
        # gauge (pre-v1.10.1).
        expr: |
          (time() - watchtower_last_scan_timestamp_seconds{job="watchtower"})
            > (2 * watchtower_poll_interval_seconds{job="watchtower"})
          unless absent(watchtower_poll_interval_seconds{job="watchtower"})
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Watchtower on {{ $labels.instance }} is overdue for a scan"
          description: "Latest scan is {{ $value | humanizeDuration }} old — more than 2× the configured poll interval. Scheduler wedged, container crashed, or Docker socket unreachable."

      - alert: WatchtowerFailuresSustained
        # At least one container has been stuck in failure for 30m. The most
        # actionable alert — covers "pulled, but update failed" without
        # requiring logs.
        expr: watchtower_containers_failed{job="watchtower"} > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Watchtower on {{ $labels.instance }} has containers stuck in failure"
          description: "At least one container keeps failing to update. Check logs for the name and reason — common causes: registry unreachable, pull-rate-limited, image missing required config."

      - alert: WatchtowerUnmanagedContainersPresent
        # With --label-enable set, containers without the enable label are
        # silently skipped — indistinguishable from intentional opt-outs.
        # Non-zero for more than an hour usually means a new service landed
        # without the label.
        expr: watchtower_containers_unmanaged{job="watchtower"} > 0
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "Watchtower on {{ $labels.instance }} has {{ $value }} unmanaged container(s)"
          description: "One or more containers have no com.centurylinklabs.watchtower.enable label. Label them true (watch) or false (explicit opt-out) — see /v1/audit for names."

      - alert: WatchtowerRegistryErrorsSustained
        # Any sustained non-zero registry error rate means pulls and digest
        # comparisons are failing end-to-end, not flaking with retry.
        expr: sum by (host) (rate(watchtower_registry_requests_total{job="watchtower", outcome="error"}[10m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Watchtower sees sustained registry errors to {{ $labels.host }}"
          description: "Outbound requests to {{ $labels.host }} have been failing for 15m. Check credentials, network reachability, or TLS verification (--registry-ca-bundle / --insecure-registry)."

      - alert: WatchtowerDockerAPIErrorsSustained
        # Sustained Docker-socket errors point at permission issues, daemon
        # load, or a half-broken daemon upgrade.
        expr: sum(rate(watchtower_docker_api_errors_total{job="watchtower"}[5m])) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Watchtower on {{ $labels.instance }} sees sustained Docker API errors"
          description: "Errors against the Docker engine API have been non-zero for 15m. Common causes: socket permissions flipped, daemon under load, or a partial Docker upgrade. Hit `docker info` on the host."
