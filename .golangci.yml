# Unified openserbia golangci-lint config.
#
# Source of truth: openserbia/go-template/.golangci.yml.
# Copy verbatim into every service module; append a SERVICE OVERRIDES block
# at the bottom for paths/rules unique to that service.

version: "2"

run:
  modules-download-mode: vendor
  timeout: 5m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused

  enable:
    # Security
    - bidichk
    - bodyclose
    - gosec
    - noctx
    - sqlclosecheck

    # Bug prevention
    - durationcheck
    - errorlint
    - exhaustive
    - fatcontext
    - gocheckcompilerdirectives
    - makezero
    - nilerr
    - nosprintfhostport
    - predeclared
    - rowserrcheck

    # Code quality
    - copyloopvar
    - dupl
    - errname
    - goconst
    - gocritic
    - intrange
    - misspell
    - mnd
    - perfsprint
    - prealloc
    - recvcheck
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace

    # Complexity (the gap that prompted this unification)
    - cyclop

    # Observability
    - loggercheck
    - promlinter

  settings:
    cyclop:
      max-complexity: 15
      package-average: 10.0

    dupl:
      threshold: 150

    exhaustive:
      default-signifies-exhaustive: true

    goconst:
      min-len: 3
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam

    gosec:
      excludes:
        - G104 # unhandled errors — covered by errcheck with better signal
        - G117 # int overflow on conversion — high FP rate on int→int32

    mnd:
      ignored-functions:
        - strconv.FormatInt
        - strconv.FormatUint
        - strconv.FormatFloat
        - strconv.ParseInt
        - strconv.ParseUint
        - strconv.ParseFloat
        - time.Duration
        - time.Sleep

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
          disabled: true
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-naming

  exclusions:
    generated: lax

    paths:
      - vendor
      - "(^|/)mocks/"
      - pkg/notifications/preview
      - tplprev

    rules:
      # Test files: dot-imports for Ginkgo/Gomega.
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"

      # Test fixtures legitimately use magic numbers, repeated strings, short slices.
      - path: _test\.go
        linters:
          - cyclop
          - dupl
          - goconst
          - mnd
          - prealloc

      # Ginkgo suite bootstraps + table tests have unused *testing.T / args.
      - path: _test\.go
        linters:
          - revive
        text: "unused-parameter"

      # SERVICE OVERRIDE (watchtower) ─────────────────────────────────────
      # ContainerStatus is a session status record (ContainerReport.Error()),
      # not an error type despite the method name.
      - path: pkg/session/container_status\.go
        linters: [errname]

      # Non-crypto random generators — backoff jitter, random container
      # names, event-test seeds. Not security relevant; math/rand is the
      # appropriate choice.
      - path: (internal/util/rand_name|internal/events/watcher|pkg/container/client|pkg/registry/retry/retry)\.go
        linters: [gosec]
        text: "G404"

      # Operator-controlled file paths surfaced through CLI flags
      # (--registry-ca-bundle, --secrets-path, --tls-ca-cert). These come
      # from a privileged operator's command line, not untrusted input.
      - path: (internal/flags/flags|internal/flags/flags_test|pkg/registry/transport/transport)\.go
        linters: [gosec]
        text: "G304|G703"

      # HTTP API binding without a per-handler timeout: timeouts are
      # configured at the listener level via --http-api-timeout, which the
      # surrounding wrapper code applies before reaching this Serve call.
      - path: pkg/api/api\.go
        linters: [gosec]
        text: "G114"

      # tokenMissingMsg is a log message, not a credential. The G101 flag
      # triggers on the variable name pattern but the value is empty-token
      # error text.
      - path: pkg/api/api\.go
        linters: [gosec]
        text: "G101"

      # Email server port is a uint16 by SMTP protocol; the int→uint16
      # conversion is bounds-checked at config-parse time.
      - path: pkg/notifications/email\.go
        linters: [gosec]
        text: "G115"

      # Registry retry deliberately re-dials user-supplied registry hosts
      # — that is the function's entire purpose. SSRF taint is a feature.
      - path: pkg/registry/retry/retry\.go
        linters: [gosec]
        text: "G704"

      # watchtower_scans_skipped is a long-published metric name; appending
      # _total now would break every consumer's existing Grafana panel and
      # Prometheus alert. Tracked separately for a future major.
      - path: pkg/metrics/metrics\.go
        linters: [promlinter]

      # sort.Interface implementations conventionally use pointer slices
      # to avoid copying large Container structs on every comparison.
      - path: pkg/sorter/sort\.go
        linters: [gocritic]
        text: "ptrToRefParam"

      # 240-byte EndpointSettings struct iteration is on a cold network-setup
      # path; rewriting as index access for one comparison harms readability.
      - path: pkg/container/client\.go
        linters: [gocritic]
        text: "rangeValCopy"

      # importShadow: many call sites in pkg/container and call sites of it
      # name local container variables `container`, which shadows the docker
      # `container` package alias / our pkg/container import. The fix is
      # invasive (rename every local) and the shadow is harmless when all
      # references in scope are unambiguous.
      - linters: [gocritic]
        text: "importShadow"

      # unnamedResult: stylistic preference for named returns. Many of our
      # signatures return (T, error) where the types are self-explanatory;
      # adding names harms readability more than it helps.
      - linters: [gocritic]
        text: "unnamedResult"

      # Ginkgo BeforeEach is a func literal by design; assigning to outer
      # ctx/cancel from inside it is the standard pattern, not a real
      # "nested context" smell.
      - path: _test\.go
        linters: [fatcontext]

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/openserbia)
  exclusions:
    generated: lax
    paths:
      - vendor
      - "(^|/)mocks/"

issues:
  max-same-issues: 5
