version: 2

builds:
  - main: ./main.go
    binary: watchtower
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    goarm:
      - "6"
    ldflags:
      - -s -w -X github.com/openserbia/watchtower/internal/meta.Version={{.Version}}

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}386
      {{- else if eq .Arch "arm" }}armhf
      {{- else if eq .Arch "arm64" }}arm64v8
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - LICENSE.md

dockers_v2:
  - images:
      - openserbia/watchtower
      - ghcr.io/openserbia/watchtower
    dockerfile: dockerfiles/Dockerfile
    platforms:
      - linux/amd64
      - linux/386
      - linux/arm/v6
      - linux/arm64
    tags:
      - "{{ .Version }}"
      - latest
    flags:
      - --pull
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.licenses: Apache-2.0
