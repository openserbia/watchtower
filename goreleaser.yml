version: 2

builds:
  - main: ./main.go
    binary: watchtower
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
      - riscv64
    goarm:
      - "6"
      - "7"
    ldflags:
      - -s -w -X github.com/openserbia/watchtower/internal/meta.Version={{.Version}}

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}386
      {{- else if eq .Arch "arm64" }}arm64v8
      {{- else if eq .Arch "arm" }}
      {{- if eq .Arm "6" }}armhf
      {{- else if eq .Arm "7" }}armv7
      {{- else }}arm{{ .Arm }}{{ end }}
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    files:
      - LICENSE.md

dockers_v2:
  - images:
      - openserbia/watchtower
      - ghcr.io/openserbia/watchtower
    dockerfile: dockerfiles/Dockerfile
    platforms:
      # linux/386 and linux/arm/v6 intentionally dropped: the distroless
      # static-debian13 base (dockerfiles/Dockerfile) is not published for those
      # two platforms. The binary archives above still cover them.
      - linux/amd64
      - linux/arm/v7
      - linux/arm64
      - linux/riscv64
    tags:
      - "{{ .Version }}"
      - latest
    flags:
      - --pull
      # SLSA build provenance attestation attached to the pushed image index
      # (inspect with `docker buildx imagetools inspect` / `cosign verify-attestation`).
      - --provenance=true
      # CycloneDX SBOM attestation (queryable component inventory; scan with
      # trivy/grype without a rebuild).
      - --sbom=true
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: Automate Docker container base image updates (openserbia fork of containrrr/watchtower)
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.url: https://github.com/openserbia/watchtower
      org.opencontainers.image.licenses: Apache-2.0

# Keyless cosign signatures (GitHub Actions OIDC -> Sigstore; no key management).
# The release workflow grants `id-token: write` and provides cosign via Devbox.
signs:
  - cmd: cosign
    artifacts: checksum
    # cosign 3.x defaults to the new Sigstore bundle (sig + cert in one file) and
    # ignores the old --output-signature/--output-certificate flags. Emit it with
    # the `.sigstore.json` suffix so OpenSSF Scorecard's Signed-Releases probe
    # recognises the release asset (it only credits .asc/.minisig/.sig/.sign/
    # .sigstore/.sigstore.json — a bare `.bundle` was scored as unsigned).
    # Verify with: cosign verify-blob --bundle <file>.sigstore.json …
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    output: true

docker_signs:
  - cmd: cosign
    artifacts: images
    args:
      - sign
      - "${artifact}"
      - "--yes"
    output: true
